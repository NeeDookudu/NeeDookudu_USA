name: USA Box Office Scraper
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp aiohttp_retry requests tqdm
      - name: Run us.py
        # Pass the secret dynamically using GitHub Actions syntax
        run: python us.py --key "${{ secrets.USA_SCRIPT_KEY }}"
      - name: Commit and Push Data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add snapshots-nz-combined/
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Auto-update USA Box Office data [skip ci]" && git push)
